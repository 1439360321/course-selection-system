<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('发起申诉')" /></head>
<body class="gray-bg"><div class="container-div"><div class="row"><div class="col-sm-8 col-sm-offset-2"><div class="ibox"><div class="ibox-content">
<form class="form-horizontal m-t" id="appeal-form">
  <div class="form-group"><label class="col-sm-3 control-label">课程号：</label><div class="col-sm-6"><input class="form-control" th:value="${cno}" readonly /></div></div>
  <div class="form-group"><label class="col-sm-3 control-label">申诉理由：</label><div class="col-sm-6"><textarea class="form-control" id="reason" rows="4"></textarea></div></div>
  <div class="form-group"><div class="col-sm-6 col-sm-offset-3"><button type="button" class="btn btn-primary" onclick="submit()">提交</button></div></div>
</form></div></div></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
function submit(){var d={cno:[[${cno}]],reason:$('#reason').val()};
  $.post(ctx+'student/appeal/add',d,function(r){if(r.code==0){$.modal.msgSuccess("提交成功");setTimeout(function(){window.location.href=ctx+'student/appeal';},1500);}else $.modal.msgError(r.msg);});}
</script></body></html>
