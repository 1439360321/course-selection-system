<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('课程审核')" /></head>
<body class="gray-bg"><div class="container-div"><div class="row"><div class="col-sm-12 select-table table-striped">
<table id="bootstrap-table"></table></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
$(function(){
  $.table.init({url:ctx+"admin/audit/list",createUrl:undefined,updateUrl:undefined,removeUrl:undefined,modalName:"课程审核",uniqueId:"cno",
    columns:[
      {field:"cno",title:"课程号"},{field:"cname",title:"课程名"},
      {field:"credit",title:"学分"},{field:"hours",title:"学时"},
      {field:"courseType",title:"类型",formatter:function(v){return v==0?"必修":"选修";}},
      {field:"deptName",title:"院系"},{field:"status",title:"审核状态",formatter:function(v){
        if(v==0)return'<span class="label label-warning">待审核</span>';
        if(v==1)return'<span class="label label-success">已通过</span>';
        return'<span class="label label-danger">已驳回</span>';}},
      {title:"操作",formatter:function(v,r,i){if(r.status!=0)return'';
        return'<a class="btn btn-success btn-xs approve-btn" data-cno="'+$.common.escapeHtml(r.cno)+'">通过</a> '+
               '<a class="btn btn-danger btn-xs reject-btn" data-cno="'+$.common.escapeHtml(r.cno)+'">驳回</a>';}}
    ]});
});
$(document).on('click','.approve-btn',function(){var cno=$(this).data('cno');$.modal.confirm("确认通过？",function(){$.post(ctx+'admin/audit/approve',{cno:cno},function(r){if(r.code==0)$.table.refresh();});});});
$(document).on('click','.reject-btn',function(){var cno=$(this).data('cno');layer.prompt({title:'请输入驳回理由',formType:2},function(reason,idx){layer.close(idx);$.post(ctx+'admin/audit/reject',{cno:cno,reason:reason},function(r){if(r.code==0)$.table.refresh();});});});
</script></body></html>
