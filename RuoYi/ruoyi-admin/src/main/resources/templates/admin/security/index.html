<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('安全审计')" /></head>
<body class="gray-bg"><div class="container-div">
<div class="row"><div class="col-sm-4"><div class="ibox"><div class="ibox-title"><h5>今日登录异常</h5></div>
<div class="ibox-content" style="text-align:center;font-size:48px;color:#e7505a" id="fail-count">--</div></div></div>
<div class="col-sm-12 select-table table-striped"><table id="bootstrap-table"></table></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
$(function(){
  $.get(ctx+"admin/security/stats",function(r){if(r.code==0)$("#fail-count").text(r.failCount||0);});
  $.table.init({url:ctx+"admin/security/events",createUrl:undefined,updateUrl:undefined,removeUrl:undefined,modalName:"登录异常",
    columns:[{field:"userName",title:"用户名"},{field:"ipaddr",title:"IP地址"},{field:"loginTime",title:"登录时间"},{field:"status",title:"状态",formatter:function(v){return v==1?'<span class="label label-danger">失败</span>':'<span class="label label-success">成功</span>';}},{field:"msg",title:"信息"}]});
});
</script></body></html>
