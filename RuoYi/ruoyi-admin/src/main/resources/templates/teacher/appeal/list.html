<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('成绩申诉')" /></head>
<body class="gray-bg"><div class="container-div"><div class="row"><div class="col-sm-12 select-table table-striped">
<table id="appeal-table"></table></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
$(function(){
  $.table.init({url:ctx+"teacher/appeal/list",search:false,modalName:"申诉处理",uniqueId:"appealId",
    columns:[{field:"sname",title:"学生"},{field:"cname",title:"课程"},{field:"reason",title:"申诉理由"},
      {field:"status",title:"状态",formatter:function(v){if(v==0)return'<span class="label label-warning">待处理</span>';if(v==1)return'<span class="label label-success">已同意</span>';return'<span class="label label-danger">已驳回</span>';}},
      {title:"操作",formatter:function(v,r,i){if(r.status!=0)return'';return'<a class="btn btn-success btn-xs" onclick="handleAppeal('+r.appealId+',1)">同意</a> <a class="btn btn-danger btn-xs" onclick="handleAppeal('+r.appealId+',2)">驳回</a>';}}]});
});
function handleAppeal(id,act){var label=act==1?'同意':'驳回';$.modal.prompt(label+'理由',function(reply){$.post(ctx+'teacher/appeal/handle',{appealId:id,status:act,reply:reply},function(r){if(r.code==0)$.table.refresh();});});}
</script></body></html>
