<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('个人信息')" /></head>
<body class="gray-bg"><div class="container-div"><div class="row"><div class="col-sm-8 col-sm-offset-2"><div class="ibox"><div class="ibox-content">
<form class="form-horizontal m-t" id="profile-form">
  <div class="form-group"><label class="col-sm-3 control-label">教师号：</label><div class="col-sm-6"><input class="form-control" th:value="${teacher.tno}" readonly /></div></div>
  <div class="form-group"><label class="col-sm-3 control-label">姓名：</label><div class="col-sm-6"><input class="form-control" th:value="${teacher.tname}" readonly /></div></div>
  <div class="form-group"><label class="col-sm-3 control-label">院系：</label><div class="col-sm-6"><input class="form-control" th:value="${teacher.deptName}" readonly /></div></div>
  <div class="form-group"><label class="col-sm-3 control-label">职称：</label><div class="col-sm-6"><input class="form-control" th:value="${teacher.rank}" readonly /></div></div>
  <div class="form-group"><div class="col-sm-6 col-sm-offset-3"><button type="button" class="btn btn-primary" onclick="save()">保存</button></div></div>
</form></div></div></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
function save(){var d=$('#profile-form').serialize();$.post(ctx+'teacher/profile/edit',d,function(r){if(r.code==0)$.modal.msgSuccess("保存成功");else $.modal.msgError(r.msg);});}
</script></body></html>
