<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('学生成绩录入')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12" style="margin-bottom:8px"><a class="btn btn-success" th:href="@{/teacher/course/students/export(cno=${param.cno})}">导出 Excel</a></div><div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
var cno = new URLSearchParams(window.location.search).get("cno");
$(function() {
    var options = {
        url: ctx + "teacher/course/students/list",
        createUrl: undefined, updateUrl: undefined, removeUrl: undefined,
        modalName: "学生", uniqueId: "sno",
        queryParams: function(params) {
            return { pageSize: params.limit, pageNum: params.offset / params.limit + 1, cno: cno };
        },
        columns: [
            {field:'sno',title:'学号'},
            {field:'sname',title:'姓名'},
            {field:'normalScore',title:'平时成绩',formatter:function(v){return v!=null?v:'<span class="label label-default">未录入</span>';}},
            {field:'testScore',title:'考试成绩',formatter:function(v){return v!=null?v:'<span class="label label-default">未录入</span>';}},
            {field:'totalScore',title:'总评',formatter:function(v,r){
                if(r.normalScore!=null&&r.testScore!=null) return Math.round((r.normalScore*0.4+r.testScore*0.6)*10)/10;
                return '-';
            }},
            {title:'操作',formatter:function(v,r){
                return '<a class="btn btn-primary btn-xs" href="#" onclick="editGrade(\''+r.sno+'\',\''+r.sname+'\','+(r.normalScore||0)+','+(r.testScore||0)+')">编辑成绩</a>';
            }}
        ]
    };
    $.table.init(options);
});

function editGrade(sno, sname, ns, ts) {
    var html = '<div style="padding:15px">';
    html += '<p><b>' + sname + '</b>（' + sno + '）</p>';
    html += '<div class="form-group"><label>平时成绩（40%）</label><input id="input-ns" class="form-control" type="number" step="0.1" min="0" max="100" value="'+(ns||'')+'"></div>';
    html += '<div class="form-group"><label>考试成绩（60%）</label><input id="input-ts" class="form-control" type="number" step="0.1" min="0" max="100" value="'+(ts||'')+'"></div>';
    html += '</div>';
    layer.open({
        type: 1, title: '编辑成绩', area: ['400px','320px'],
        content: html,
        btn: ['保存', '取消'],
        yes: function(index) {
            var ns2 = parseFloat($("#input-ns").val());
            var ts2 = parseFloat($("#input-ts").val());
            if (isNaN(ns2) || ns2<0 || ns2>100) { layer.msg('平时成绩需在0-100之间'); return; }
            if (isNaN(ts2) || ts2<0 || ts2>100) { layer.msg('考试成绩需在0-100之间'); return; }
            $.ajax({
                type: "POST", url: ctx + "teacher/grade/save",
                data: { sno: sno, cno: cno, normalScore: ns2, testScore: ts2 },
                success: function(r) {
                    if (r.code == web_status.SUCCESS) {
                        layer.close(index);
                        $.modal.msgSuccess(r.msg || '保存成功');
                        $.table.refresh();
                    } else {
                        $.modal.alertError(r.msg);
                    }
                }
            });
        }
    });
}
    </script>
</body>
</html>
