<!DOCTYPE html><html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:include="include :: header('开课申请')" /></head>
<body class="gray-bg"><div class="container-div"><div class="row"><div class="col-sm-12">
<div class="btn-group-sm"><a class="btn btn-primary" href="proposal/add">新增申请</a></div>
<div class="select-table table-striped"><table id="proposal-table"></table></div></div></div></div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">var ctx=[[@{/}]];
$(function(){
  $.table.init({url:ctx+"teacher/proposal/list",search:false,modalName:"开课申请",uniqueId:"cno",
    columns:[{field:"cno",title:"课程号"},{field:"cname",title:"课程名"},{field:"credit",title:"学分"},
      {field:"hours",title:"学时"},{field:"courseType",title:"类型",formatter:function(v){return v==0?"必修":"选修";}},
      {field:"status",title:"状态",formatter:function(v){if(v==0)return'<span class="label label-warning">待审核</span>';if(v==1)return'<span class="label label-success">已通过</span>';return'<span class="label label-danger">已驳回</span>';}},
      {field:"rejectReason",title:"备注"}]});
});
</script></body></html>
