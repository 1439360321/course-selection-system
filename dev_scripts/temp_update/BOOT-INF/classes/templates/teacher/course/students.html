<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('学生成绩录入')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
var cno = new URLSearchParams(window.location.search).get("cno");
console.log("获取到的cno参数:", cno);
$(function() {
    console.log("初始化表格...");
    var options = {
        url: ctx + "teacher/course/students/list",
        createUrl: undefined, updateUrl: undefined, removeUrl: undefined,
        modalName: "学生", uniqueId: "sno",
        queryParams: function(params) { 
            var query = {
                pageSize: params.limit, 
                pageNum: params.offset / params.limit + 1, 
                cno: cno
            };
            console.log("请求参数:", query);
            return query; 
        },
        columns: [
            {field:'sno',title:'学号'},
            {field:'sname',title:'姓名'},
            {field:'normalScore',title:'平时成绩'},
            {field:'testScore',title:'考试成绩'}
        ]
    };
    console.log("表格配置:", options);
    $.table.init(options);
    console.log("表格初始化完成");
});
    </script>
</body>
</html>
